<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Void Corsair</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🚀</text></svg>" />
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #05060d; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; }

    #hud {
      position: fixed; inset: 0; pointer-events: none;
      font-family: "Consolas", "SF Mono", ui-monospace, monospace;
      color: #9fe7ff; text-shadow: 0 0 6px rgba(80,200,255,0.6);
    }
    #hud .corner { position: absolute; padding: 12px 16px; font-size: 13px; letter-spacing: 1px; }
    #hud .tl { top: 0; left: 0; line-height: 1.7; }
    #hud .bl { bottom: 0; left: 0; opacity: 0.6; font-size: 12px; }
    #hud .br { bottom: 0; right: 0; opacity: 0.7; }
    #hud .title { font-size: 18px; font-weight: bold; letter-spacing: 3px; color: #ff5db1; text-shadow: 0 0 10px rgba(255,93,177,0.7); }
    #hud-credits { color: #ffe6a0; text-shadow: 0 0 8px rgba(255,210,120,0.5); }
    #hud-xp { color: #b9a0ff; font-size: 12px; text-shadow: 0 0 8px rgba(150,120,255,0.4); }
    #hud-combat { margin-top: 4px; font-size: 12px; line-height: 1.6; }
    #hud-combat .sh { color: #66aaff; }
    #hud-combat .hl { color: #ff8a6e; }
    #hud-combat .wanted { color: #ffd24a; letter-spacing: 2px; }
    #hud-quest { margin-top: 6px; font-size: 12px; color: #ffd24a; max-width: 360px;
      text-shadow: 0 0 8px rgba(255,210,120,0.4); }
    #hud-missions { margin-top: 4px; font-size: 12px; color: #aef0c0; max-width: 360px; line-height: 1.5;
      text-shadow: 0 0 8px rgba(120,255,160,0.35); }
    #hud-missions .bty { color: #ff8a6e; }

    #loading {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      font-family: ui-monospace, monospace; color: #9fe7ff; font-size: 14px; letter-spacing: 2px;
      background: #05060d; transition: opacity 0.6s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    #hud-approach {
      position: absolute; left: 50%; bottom: 90px; transform: translateX(-50%);
      text-align: center; font-size: 15px; letter-spacing: 1px; color: #aef0c0;
      text-shadow: 0 0 10px rgba(120,255,160,0.5); opacity: 0; transition: opacity 0.2s;
    }
    #hud-approach.show { opacity: 1; }
    #hud-approach .lo { font-size: 12px; opacity: 0.7; color: #cfeaff; }

    #hud-toast {
      position: absolute; left: 50%; top: 70px; transform: translateX(-50%);
      padding: 8px 16px; background: rgba(8,12,24,0.85); border: 1px solid #3a6ab0;
      border-radius: 6px; font-size: 13px; color: #cfeaff; opacity: 0;
      transition: opacity 0.3s;
    }
    #hud-toast.show { opacity: 1; }

    #fade {
      position: fixed; inset: 0; z-index: 20; background: #02030a;
      opacity: 0; pointer-events: none; transition: opacity 0.45s ease;
    }
    #fade.on { opacity: 1; }

    #radar { position: fixed; right: 18px; bottom: 40px; width: 170px; height: 170px;
      opacity: 0.9; pointer-events: none; display: none; }
    #radar.show { display: block; }
    #markers { position: fixed; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 5; }
    #minimap { position: fixed; right: 18px; bottom: 40px; width: 170px; height: 170px;
      opacity: 0.92; pointer-events: none; display: none; }
    #minimap.show { display: block; }

    /* boss health bar — top center during a Warlord fight */
    #boss-bar { position: fixed; top: 22px; left: 50%; transform: translateX(-50%);
      width: min(440px, 80vw); display: none; pointer-events: none; text-align: center; }
    #boss-bar.show { display: block; }
    #boss-bar .bb-label { font-size: 12px; letter-spacing: 4px; color: #ff5b6e;
      text-shadow: 0 0 10px rgba(255,60,80,0.8); margin-bottom: 4px; }
    #boss-bar .bb-track { height: 12px; background: rgba(40,8,12,0.7);
      border: 1px solid #ff3b50; border-radius: 6px; overflow: hidden; box-shadow: 0 0 16px rgba(255,60,80,0.5); }
    #boss-bar .bb-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #ff3b50, #ff8a5b);
      transition: width 0.15s linear; }

    /* on-foot aiming reticle — fixed at screen center, shows where the blaster fires */
    #reticle { position: fixed; left: 50%; top: 50%; width: 30px; height: 30px;
      transform: translate(-50%, -50%); pointer-events: none; display: none; z-index: 6;
      border: 2px solid rgba(158,255,160,0.85); border-radius: 50%;
      box-shadow: 0 0 8px rgba(120,255,160,0.55), inset 0 0 6px rgba(120,255,160,0.25); }
    #reticle.show { display: block; }
    #reticle::after { content: ""; position: absolute; left: 50%; top: 50%;
      width: 3px; height: 3px; border-radius: 50%; background: #9effa0;
      transform: translate(-50%, -50%); box-shadow: 0 0 6px rgba(120,255,160,0.9); }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud">
    <div class="corner tl">
      <div class="title">VOID CORSAIR</div>
      <div id="hud-mode">MODE: SPACE</div>
      <div id="hud-throttle">THR [················] 0%</div>
      <div id="hud-speed">SPD 0 u/s</div>
      <div id="hud-credits">500 cr</div>
      <div id="hud-xp"></div>
      <div id="hud-combat"></div>
      <div id="hud-quest"></div>
      <div id="hud-missions"></div>
    </div>
    <div class="corner bl">MOUSE steer · CLICK/J fire · L missile · SPACE thrust · SHIFT brake · W/S/A/D/Q/E fly · M map</div>
    <div class="corner br" id="hud-fps">-- fps</div>
    <canvas id="markers"></canvas>
    <canvas id="radar" width="170" height="170"></canvas>
    <canvas id="minimap" width="170" height="170"></canvas>
    <div id="reticle"></div>
    <div id="hud-approach"></div>
    <div id="boss-bar"><div class="bb-label">WARLORD</div><div class="bb-track"><div class="bb-fill"></div></div></div>
    <div id="hud-toast"></div>
  </div>
  <div id="loading">INITIALIZING SYSTEMS…</div>
  <div id="fade"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
